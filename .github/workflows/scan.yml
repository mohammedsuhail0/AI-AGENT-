name: Gmail Scan Agent

on:
  schedule:
    - cron: '*/15 * * * *'  # Runs every 15 minutes (scanning)
    - cron: '30 14 * * *'   # Runs at 2:30 PM UTC / 8:00 PM IST (daily digest)
  workflow_dispatch:        # Allows manual execution in the GitHub Actions UI

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Scanner Script
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          STUDENT_PROFILE: ${{ secrets.STUDENT_PROFILE }}
        run: |
          if [ "${{ github.event.schedule }}" = "30 14 * * *" ]; then
            python check_emails.py --digest
          else
            python check_emails.py
          fi
